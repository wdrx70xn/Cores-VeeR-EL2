name: VeeR-EL2 verification
'on':
  workflow_call: null
defaults:
  run:
    shell: bash
jobs:
  tests:
    name: Verification tests
    runs-on: ubuntu-24.04
    container: ghcr.io/antmicro/cores-veer-el2:20250411084921
    strategy:
      matrix:
        bus:
        - ahb
        - axi
        test:
        - test_pyuvm
        coverage:
        - all
    env:
      DEBIAN_FRONTEND: noninteractive
      CCACHE_DIR: /opt/regression/.cache/
      FULL_NAME: ${{ matrix.bus }}-verification-${{ matrix.test }}
    steps:
    - name: Setup repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install coverage dependencies
      run: 'python3 -m venv .venv

        source .venv/bin/activate

        pip install -r .github/scripts/requirements-coverage.txt

        '
    - name: Install prerequisities
      run: "echo \"deb http://archive.ubuntu.com/ubuntu/ noble main universe\" | sudo\
        \ tee -a /etc/apt/sources.list > /dev/null\nsudo apt -qqy update && sudo apt\
        \ -qqy --no-install-recommends install \\\n  autoconf automake autotools-dev\
        \ \\\n  bc bison build-essential \\\n  ccache curl \\\n  flex \\\n  gawk gcc-riscv64-unknown-elf\
        \ git gperf \\\n  help2man \\\n  libexpat-dev libfl-dev libfl2 libgmp-dev\
        \ \\\n  libmpc-dev libmpfr-dev libpython3-all-dev libtool \\\n  ninja-build\
        \ \\\n  patchutils python3 python3-dev python3-pip \\\n  texinfo \\\n  zlib1g\
        \ zlib1g-dev\n"
    - name: Setup environment
      run: 'echo "/opt/verilator/bin" >> $GITHUB_PATH

        RV_ROOT=`pwd`

        echo "RV_ROOT=$RV_ROOT" >> $GITHUB_ENV

        PYTHONUNBUFFERED=1

        echo "PYTHONUNBUFFERED=$PYTHONUNBUFFERED" >> $GITHUB_ENV

        TEST_PATH=$RV_ROOT/verification/top/${{ matrix.test }}

        echo "TEST_PATH=$TEST_PATH" >> $GITHUB_ENV

        echo "HTML_FILE=${FULL_NAME}_${{ matrix.coverage }}.html" >> $GITHUB_ENV

        '
    - name: Run ${{ matrix.test }}
      run: "source .venv/bin/activate\npip3 install meson\npip3 install -r $RV_ROOT/verification/top/requirements.txt\n\
        PYTEST_STYLE_SRC_DIR=$RV_ROOT/.github/scripts/pytest/\nPYTEST_CSS=${PYTEST_STYLE_SRC_DIR}/css/styles.css\n\
        if [ ${{ matrix.bus }} = axi ]; then\n    CONF_PARAMS='-set build_axi4'\n\
        else\n    CONF_PARAMS='-set build_ahb_lite'\nfi\npushd ${TEST_PATH}\n  python\
        \ -m pytest ${{ matrix.test }}.py -sv --coverage=${{ matrix.coverage }} --html=$HTML_FILE\
        \ --md=$GITHUB_STEP_SUMMARY --css=$PYTEST_CSS --conf_params=\"$CONF_PARAMS\"\
        \n  bash ${PYTEST_STYLE_SRC_DIR}/style_pytest_report.sh ${PYTEST_STYLE_SRC_DIR}\
        \ ${TEST_PATH} ${HTML_FILE}\npopd\n"
    - name: Prepare pytest-html data
      run: "source .venv/bin/activate\npushd $RV_ROOT\n  WEBPAGE_DIR=webpage_${FULL_NAME}_${{\
        \ matrix.coverage }}\n  mkdir -p $WEBPAGE_DIR\n  mv ${TEST_PATH}/$HTML_FILE\
        \ $WEBPAGE_DIR\n  mv ${TEST_PATH}/assets $WEBPAGE_DIR\n  JS_SCRIPT_DIR=$RV_ROOT/.github/scripts/pytest/script\n\
        \  mv $JS_SCRIPT_DIR $WEBPAGE_DIR\npopd\n"
    - name: Prepare coverage data
      run: "source .venv/bin/activate\nexport PATH=/opt/verilator/bin:$PATH\nmkdir\
        \ -p results\n.github/scripts/convert_dat.sh ${TEST_PATH}/coverage.dat \\\n\
        \   results/coverage_${FULL_NAME/test_/}\n"
    - name: Upload pytest-html artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: verification_dashboard_${{ env.FULL_NAME }}_${{ matrix.coverage }}
        path: webpage_*
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: verification_tests_coverage_data_${{ env.FULL_NAME }}_${{ matrix.coverage
          }}
        path: results/*.info
  custom-verification-tests:
    name: Custom verification tests
    runs-on: ubuntu-latest
    container: centos:8
    strategy:
      matrix:
        bus:
        - axi
        - ahb
        test:
        - test_pyuvm
    env:
      GHA_EXTERNAL_DISK: additional-tools
      GHA_SA: gh-sa-veer-uploader
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set secrets version
      run: echo "SECRETS_VERSION=`cat .github/scripts/secrets_version`" >> $GITHUB_ENV
    - name: Run tests
      run: _secret_combined_${{ env.SECRETS_VERSION }}
      env:
        SECRET_NAME: _secret_custom_verification_tests
        TEST: ${{ matrix.test }}
        BUS: ${{ matrix.bus }}
